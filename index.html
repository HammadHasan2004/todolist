<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskFlow — To-Do App</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="app-wrapper">
    <header class="app-header">
      <h1 class="logo">Welcome to my website</h1>
      <h1 class="logo">TaskFlow</h1>
      <p class="subtitle">Get things done, beautifully.</p>
    </header>

    <main class="app-main">
      <!-- Add Task Form -->
      <section class="add-task-section">
        <div class="input-group">
          <input
            type="text"
            id="taskInput"
            class="task-input"
            placeholder="What needs to be done?"
            autocomplete="off"
          />
          <select id="prioritySelect" class="priority-select">
            <option value="low">Low</option>
            <option value="medium" selected>Medium</option>
            <option value="high">High</option>
          </select>
          <button id="addBtn" class="add-btn" onclick="addTask()">Add</button>
        </div>
      </section>

      <!-- Filter Bar -->
      <section class="filter-section">
        <div class="filter-bar">
          <button class="filter-btn active" onclick="filterTasks('all')">All</button>
          <button class="filter-btn" onclick="filterTasks('active')">Active</button>
          <button class="filter-btn" onclick="filterTasks('completed')">Completed</button>
        </div>
        <div class="stats">
          <span id="taskCount">0 tasks remaining</span>
        </div>
      </section>

      <!-- Task List -->
      <section class="task-list-section">
        <ul id="taskList" class="task-list"></ul>
        <div id="emptyState" class="empty-state">
          <div class="empty-icon">✓</div>
          <p>No tasks yet. Add one above!</p>
        </div>
      </section>

      <!-- Footer Actions -->
      <section class="footer-actions">
        <button class="clear-btn" onclick="clearCompleted()">Clear Completed</button>
      </section>
    </main>
  </div>

  <!-- Edit Modal -->
  <div id="editModal" class="modal-overlay" style="display:none;">
    <div class="modal">
      <h2 class="modal-title">Edit Task</h2>
      <input type="text" id="editInput" class="task-input" />
      <div class="modal-actions">
        <button onclick="saveEdit()" class="add-btn">Save</button>
        <button onclick="closeModal()" class="clear-btn">Cancel</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
